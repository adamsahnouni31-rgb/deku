<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Boutique Premium</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    background: #1e293b;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 30px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #22c55e;
    border: none;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    color: red;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-size: 30px;
}
</style>
</head>

<body>

<header>💎 Boutique Premium 💎</header>

<div class="container">
    <div class="card">
        <h2>Pack Légendaire</h2>
        <p>5000 gems</p>
        <button onclick="prank()">Acheter</button>
    </div>

    <div class="card">
        <h2>Skin Ultra Rare</h2>
        <p>Exclusif 🔥</p>
        <button onclick="prank()">Acheter</button>
    </div>

    <div class="card">
        <h2>Pack Débutant</h2>
        <p>500 gems</p>
        <button onclick="prank()">Acheter</button>
    </div>
</div>

<div id="overlay">
    <p>⚠️ COMPTE COMPROMIS ⚠️</p>
    <p>Connexion en cours...</p>
</div>

<script>
function prank() {
    let overlay = document.getElementById("overlay");
    overlay.style.display = "flex";

    setTimeout(() => {
        overlay.innerHTML = `
            <h1 style="color: lime;">😂 Relax ! 😂</h1>
            <p style="color: white;">C'était une blague 😎</p>
        `;
    }, 3000);
}
</script>

</body>
</html>
