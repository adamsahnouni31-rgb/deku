<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Récompense Gratuite</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

header {
    padding: 20px;
    font-size: 28px;
    background: #1e293b;
}

button {
    margin-top: 50px;
    padding: 15px 30px;
    font-size: 20px;
    background: #22c55e;
    border: none;
    cursor: pointer;
}

#overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#overlay img {
    width: 220px;
    margin: 20px;
}

.loader {
    border: 5px solid #333;
    border-top: 5px solid lime;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<header>🎁 Cadeau Gratuit 🎁</header>

<button onclick="startPrank()">Récupérer la récompense</button>

<div id="overlay">
    <h2>Scan du code requis</h2>
    <img src="ton-image.png" alt="QR Code">
    <p>Connexion au serveur...</p>
    <div class="loader"></div>
</div>

<script>
function startPrank() {
    let o = document.getElementById("overlay");
    o.style.display = "flex";

    setTimeout(() => {
        o.innerHTML = `
            <h1 style="color:red;">⚠️ Accès refusé ⚠️</h1>
            <p>Compte Brawl Stars compromis 😱</p>
        `;
    }, 3000);

    setTimeout(() => {
        o.innerHTML = `
            <h1 style="color:lime;">😂 C'ÉTAIT UNE BLAGUE 😂</h1>
            <p>Rien n'a été volé 😎</p>
        `;
    }, 6000);
}
</script>

</body>
</html>
